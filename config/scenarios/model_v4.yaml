portfolio:
  max_position_pct: 0.085         # manual per-name cap (83-name universe)
  max_total_exposure: 0.90
  max_new_trades_per_day: 2

signals:
  min_composite_score: 0.70      # ranker still orders the full universe each day

# ─── ALL-TICKER overrides ─────────────────────────────────────────────────────
# Every field here applies to ALL tickers unless a ticker_groups entry overrides it.
risk:
  stop_loss: 0.15                 # 15% stop, anchored to entry, for every name
  take_profit: null              # no fixed profit cap — let winners run
  trailing_stop: null             # no trailing stop
  max_holding_days: 90            # exit after 90 trading days
  # Anti-falling-knife re-entry gate (trough-based): after a STOP-LOSS exit, track
  # the name's lowest price since that stop and block re-entry until it bounces
  # >=10% above that trough. Only fires after stops; it merely UNBLOCKS re-entry.
  reentry_recover_pct: 0.10
  # ── Score-conditional exits (new in model_v3) ──
  stop_loss_score_max: 0.90       # stop-loss fires only when current composite score < 0.90
  max_hold_score_max: 0.80        # max-hold suppressed until composite score < 0.80
  # ── Persistence rules (consecutive-day score conditions) ──
  # Score-decay sell DISABLED: the sensitivity sweep showed the 0.50 setting was the
  # worst cell — it dumped names that then recovered (off → +466% vs +361%, lower DD,
  # higher PF). Left here, commented, for reference.
  # score_exit_below: 0.50
  # score_exit_days: 3
  score_entry_above: 0.90         # BUY if composite score > 0.90 for score_entry_days in a row (raised 0.85→0.90 per sweep)
  score_entry_days: 3
  fund_by_rotation: true          # if cash is short for a persistence buy, sell the lowest 3-day-avg holding
  # ── Volatility targeting (new in model_v4; Barroso) ──
  target_vol: 0.35                # scale gross exposure by clip(0.35 / forecast_vol, floor, cap)
  vol_lookback_days: 126          # trailing window for the realized-vol forecast (Barroso: ~6 months)
  vol_exposure_floor: 0.3         # never de-risk below 30% of the base budget
  vol_exposure_cap: 1.0           # de-risk only — no leverage above the base budget

# Per-ticker overrides layer ON TOP of the all-ticker `risk:` block above.
# Leave commented to apply the uniform rule to everyone. Example for one name:
