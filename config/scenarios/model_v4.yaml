# ─── Scenario: model_v4 (RECOMMENDED CONFIG) ────────────────────────────────
# Built on model_v3 (83-name universe + all-ticker exits + score-conditional exits
# + persistence buy + rotation funding), adding the one validated improvement from
# this round of analysis: Barroso-style VOLATILITY TARGETING.
#
# What carries over from model_v3 (already sensitivity-tuned):
#   * stop-loss only fires when composite score < 0.90; max-hold suppressed until < 0.80
#   * persistence buy: score > 0.90 for 3 consecutive days (raised from 0.85 per the sweep)
#   * score-decay sell DISABLED (0.50 was the worst cell — dumped names that recovered)
#   * rotation funding on; trough-based re-entry gate at 10%
#
# NEW in v4 — volatility targeting (Barroso & Santa-Clara, "Momentum Has Its Moments"):
#   scale gross exposure by clip(target_vol / forecast_vol, floor, cap), where forecast
#   = the portfolio's own trailing 126-day realized vol (annualized). Tuned to model_v3's
#   (hotter) vol profile: a 0.35 target dominated on 2018-2026 (incl. 2018/2020/2022
#   crashes) — return +1077%→+1658%, max drawdown -41.5%→-37.9%, Sharpe 1.10→1.28, PF
#   1.88→2.19. (model_v2's lower-vol book wanted ~0.25; v3 runs hotter, so 0.35.)
#   IN-SAMPLE on one window — re-tune/validate OOS before trusting the magnitude.
#
# Override layering (per ticker, per field): ticker_groups entry → scenario `risk:`
# (all-ticker) → base config/strategy.yaml default.

name: model_v4
description: >
  RECOMMENDED config. model_v3 (83-name universe, score-conditional exits, persistence
  buy >0.90, rotation funding) plus Barroso volatility targeting (~35% annualized, tuned
  to v3's vol profile) that shrinks gross exposure when forecast vol is high — dominated
  v3 on return, drawdown, Sharpe and PF in 2018-2026 validation.

