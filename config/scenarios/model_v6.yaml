# ─── Scenario: model_v5 (model_v4 + shock overlay) ──────────────────────────
# Identical to model_v4 (83-name universe, score-conditional exits, persistence buy,
# rotation funding, Barroso volatility targeting) PLUS a fast, event-driven SHOCK
# OVERLAY on the at-close BUY recommendations.
#
# Why: model_v4's only governor is Barroso vol targeting, which reacts on a 126-day
# (6-month) realized-vol forecast — far too slow to respond to a single highly volatile
# session. The 2022 stress test showed v4 churning new buys into a high-vol chop
# (win rate 24%, PF 0.37). The overlay conditions tomorrow's NEW BUYS on TODAY's move:
#
#   * Shock day (|equal-weight basket 1d return| > vol_k × trailing σ):
#       - size new buys DOWN by size_mult   (volatility clustering → tomorrow's vol is high)
#       - DON'T CHASE the day's top-decile single-day gappers (short-term reversal risk)
#   * Correlated DOWN-crash (shock + breadth collapsed + momentum INVERTING):
#       - cut new buys to crash_size_mult (≈ stop adding into a momentum-crash tape)
#
# Conditions only the new-buy side; exits stay governed by the existing score-gated
# logic (we found sell-side vol-trimming hurts). Theory-derived thresholds (vol
# clustering / short-term reversal / Daniel-Moskowitz momentum crashes), NOT fit to any
# single year — validate across the regime panel and OOS before trusting magnitudes.

name: model_v6
description: >
  model_v4 plus a fast shock overlay: after a highly volatile session, size new buys
  down and skip the day's blow-off gappers; in a confirmed correlated down-crash (breadth
  collapse + momentum inversion) stop adding entirely. New-buy-side only; exits unchanged.

