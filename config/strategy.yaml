portfolio:
  starting_value: 100000.0       # paper portfolio starting cash ($)
  max_position_pct: auto         # "auto" = max_total_exposure ÷ n_tickers (equal-weight, full deployment); or set a fixed fraction e.g. 0.05
  max_total_exposure: 0.75       # max combined long exposure = 75% of portfolio
  max_new_trades_per_day: 2      # reduced from 3; sensitivity showed lower churn helped

risk:
  stop_loss: 0.075               # widened from 5% to 7.5%; best stop-loss sensitivity result
  take_profit: 0.10              # raised from 10% to 15%; improved result versus baseline
  max_holding_days: 30           # extended from 10; longer holds reduced churn and improved return
  slippage: 0.001                # keep unchanged at 0.10% per fill

signals:
  top_candidates: 10             # keep unchanged; still review enough names before filters
  min_composite_score: 0.70      # modest quality filter; 0.80 helped more but may be too restrictive
  weights:                       # more volume confirmation; best signal-weight profile
    return_1d: 0.10
    return_5d: 0.25
    return_20d: 0.30
    vol_ratio: 0.35

data:
  period: "90d"                  # keep unchanged for now
  interval: "1d"                 # daily bars