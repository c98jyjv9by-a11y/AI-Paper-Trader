# ─── Scenario: model_v3 ─────────────────────────────────────────────────────
# Copy of model_v2 (same 83-name universe + all-ticker exit rule) PLUS score-
# conditional exits:
#   * a STOP-LOSS only fires if the name's current composite score is below 0.90
#     (a still-strong name is given room — its stop is suppressed).
#   * a MAX-HOLDING exit is suppressed UNTIL the score falls below 0.80
#     (let a still-strong name keep running past the 90-day hold cap).
# Take-profit and trailing-stop are never score-gated. Both thresholds are swept in
# the scenario's sensitivity analysis.
#
# Override layering (per ticker, per field): ticker_groups entry → scenario `risk:`
# (all-ticker) → base config/strategy.yaml default.

name: model_v3
description: >
  model_v2's 83-name universe and uniform exit rule, plus score-conditional exits:
  stop-loss only below a 0.90 composite score, and max-hold suppressed until the
  score falls below 0.80 — so still-strong names are given room to run.

